
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankofa Impact | Accountability Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid #e2e8f0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); z-index: 100; overflow-y: auto; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-8">
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black text-slate-900">SANKOFA</h1>
                <p class="text-xs font-bold text-emerald-600 uppercase tracking-widest">Accountability Portal</p>
            </div>
            <button onclick="document.getElementById('admin-modal').style.display='flex'" class="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold text-sm shadow-lg shadow-emerald-600/20">SETTINGS</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-900 text-white p-8 rounded-3xl">
                <p class="text-slate-400 text-sm font-bold">Total Audited Funding</p>
                <h2 class="text-4xl font-black mt-2" id="total-funds">GH₵ 345,000</h2>
            </div>
            <div class="glass p-8 rounded-3xl">
                <p class="text-slate-500 text-sm font-bold">Impact Simulator</p>
                <input type="range" id="sim-slider" min="1000" max="100000" class="w-full mt-4 accent-emerald-600">
                <p class="mt-2 text-sm font-bold text-emerald-600" id="sim-text">Estimated impact for your gift.</p>
            </div>
        </div>

        <div class="glass p-8 rounded-3xl">
            <h3 class="font-bold text-slate-900 mb-6">Transaction Ledger</h3>
            <div id="ledger-list" class="space-y-3"></div>
        </div>
    </div>

    <div id="admin-modal" class="modal flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm">
            <h2 class="font-black text-xl mb-4">Admin Access</h2>
            <input type="password" id="pin" placeholder="Enter PIN" class="w-full p-4 bg-slate-100 rounded-xl mb-4">
            <button onclick="verify()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl">LOGIN</button>
            <button onclick="document.getElementById('admin-modal').style.display='none'" class="w-full mt-4 text-slate-400 font-bold text-xs">CANCEL</button>
        </div>
    </div>

    <script>
        const state = { funds: 345000, pin: "1234", ledger: [{d: "Solar Pump", a: 35000}, {d: "Maternal Kits", a: 22000}] };

        function updateUI() {
            document.getElementById('total-funds').innerText = `GH₵ ${state.funds.toLocaleString()}`;
            document.getElementById('ledger-list').innerHTML = state.ledger.map(l => `
                <div class="flex justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="font-bold text-slate-700">${l.d}</span>
                    <span class="font-black text-red-500">-${l.a.toLocaleString()}</span>
                </div>`).join('');
        }

        function verify() {
            if(document.getElementById('pin').value === state.pin) {
                alert("Control Panel Unlocked.");
                document.getElementById('admin-modal').style.display = 'none';
            } else {
                alert("Wrong PIN.");
            }
        }

        document.getElementById('sim-slider').oninput = (e) => {
            document.getElementById('sim-text').innerText = `Your GH₵ ${parseInt(e.target.value).toLocaleString()} supports ~${Math.floor(e.target.value/45)} people.`;
        };

        window.onload = updateUI;
    </script>
</body>
</html>
