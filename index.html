

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankofa Impact | Comprehensive Accountability Portal</title>
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900">SANKOFA</h1>
                <p class="text-xs font-bold text-emerald-600 tracking-[0.2em] uppercase">Impact Accountability Portal</p>
            </div>
            <button onclick="toggleAdmin()" class="bg-slate-900 text-white px-6 py-2 rounded-full font-bold text-sm">ADMIN</button>
        </header>

        <!-- Main Dashboard Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Stats Card -->
            <div class="md:col-span-1 bg-emerald-600 text-white p-8 rounded-[2rem]">
                <p class="opacity-80 text-sm font-semibold">Total Audited Funds</p>
                <h2 class="text-4xl font-black mt-2" id="total-val">GH₵ 0</h2>
                <div class="mt-8 pt-8 border-t border-emerald-500">
                    <p class="text-xs uppercase font-bold tracking-widest opacity-70">Status</p>
                    <p class="font-bold">Verified & Active</p>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="md:col-span-2 glass p-8 rounded-[2rem]">
                <h3 class="font-bold text-slate-900 mb-6">Expenditure Overview</h3>
                <canvas id="impactChart" height="150"></canvas>
            </div>
        </div>

        <!-- Project List -->
        <div class="mt-8 glass p-8 rounded-[2rem]">
            <h3 class="font-bold text-slate-900 mb-6">Initiative Breakdown</h3>
            <div id="project-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm">
            <h2 class="font-black text-xl mb-4">Administrator Access</h2>
            <input type="password" id="pin-entry" placeholder="Enter PIN" class="w-full p-4 bg-slate-100 rounded-xl mb-4 border-none">
            <button onclick="checkPin()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl">LOGIN</button>
            <button onclick="toggleAdmin()" class="w-full mt-2 text-slate-400 font-bold text-sm">CANCEL</button>
        </div>
    </div>

    <script>
        // App Configuration
        const appData = {
            totalFunds: 345000,
            projects: [
                { name: "Wa Water Infrastructure", amount: 150000 },
                { name: "Sankofa Maternal Kits", amount: 50000 },
                { name: "Education Outreach", amount: 145000 }
            ]
        };

        // Initialize UI
        function init() {
            document.getElementById('total-val').innerText = `GH₵ ${appData.totalFunds.toLocaleString()}`;
            const container = document.getElementById('project-list');
            container.innerHTML = appData.projects.map(p => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="font-bold text-slate-700">${p.name}</span>
                    <span class="font-black text-emerald-600">GH₵ ${p.amount.toLocaleString()}</span>
                </div>
            `).join('');

            // Render Chart
            const ctx = document.getElementById('impactChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: appData.projects.map(p => p.name),
                    datasets: [{
                        data: appData.projects.map(p => p.amount),
                        backgroundColor: ['#059669', '#10b981', '#34d399']
                    }]
                }
            });
            lucide.createIcons();
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('hidden');
        }

        function checkPin() {
            const pin = document.getElementById('pin-entry').value;
            if (pin === "1234") {
                alert("Access Verified");
                toggleAdmin();
            } else {
                alert("Invalid PIN");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
