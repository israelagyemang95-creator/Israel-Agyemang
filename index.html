
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankofa Impact | Global Accountability Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .full-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 100; display: none; flex-direction: column; overflow-y: auto; padding: 1.5rem; }
    </style>
</head>
<body class="pb-16">
    <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-emerald-600 p-2 rounded-xl text-white"><i data-lucide="leaf" class="w-6 h-6"></i></div>
            <div>
                <h1 class="font-black text-xl text-slate-900 uppercase leading-none">SANKOFA</h1>
                <p class="text-[9px] font-bold text-emerald-600 tracking-widest uppercase mt-0.5">Accountability Portal</p>
            </div>
        </div>
        <button onclick="document.getElementById('admin-pin-modal').style.display='flex'" class="bg-emerald-600 text-white font-bold text-xs py-2 px-4 rounded-xl">SETTINGS</button>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-10 space-y-10">
        <section class="bg-slate-900 rounded-[2rem] p-10 text-white shadow-2xl relative overflow-hidden">
            <h2 class="text-5xl font-black" id="total-funds-display">GH₵ 345,000</h2>
            <p class="text-emerald-400 font-bold mt-2">Live Audited Funding</p>
        </section>

        <div class="glass-card p-8 rounded-[2rem]">
            <h3 class="font-extrabold text-xl mb-6">Active Field Initiatives</h3>
            <div id="project-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
    </main>

    <div id="admin-pin-modal" class="full-modal items-center justify-center">
        <div class="bg-slate-900 w-full max-w-sm rounded-[2rem] p-8 text-center border border-slate-800">
            <h2 class="text-white font-bold mb-4">Enter Master PIN</h2>
            <input type="password" id="admin-pin-input" class="w-full p-3 rounded-lg mb-4 text-center text-2xl font-black">
            <button onclick="verifyPin()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">Verify PIN</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let state = { totalGHS: 345000, adminPin: "1234", projects: [{ name: "Wa Water Infrastructure", budget: 150000 }, { name: "Sankofa Maternal Kits", budget: 50000 }] };
        
        function renderApp() {
            document.getElementById('total-funds-display').innerText = `GH₵ ${state.totalGHS.toLocaleString()}`;
            document.getElementById('project-container').innerHTML = state.projects.map(p => `
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                    <h4 class="font-bold text-slate-900">${p.name}</h4>
                    <p class="text-xs text-slate-400 mt-2">Budget: GH₵ ${p.budget.toLocaleString()}</p>
                </div>`).join('');
        }
        
        function verifyPin() {
            if (document.getElementById('admin-pin-input').value === state.adminPin) {
                alert("Access Granted - You are in the Control Dashboard");
                document.getElementById('admin-pin-modal').style.display = 'none';
            } else {
                alert("Incorrect PIN");
            }
        }
        
        window.onload = renderApp;
    </script>
</body>
</html>
