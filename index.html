   
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sankofa Impact Initiative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; }
        .full-modal { position: fixed; inset: 0; background: #1e293b; z-index: 100; overflow-y: auto; padding: 20px; display: none; }
    </style>
</head>
<body class="pb-10">

    <header class="p-4 flex justify-between items-center border-b border-slate-800 sticky top-0 bg-slate-900 z-50">
        <div class="font-black text-xl tracking-tighter">SANKOFA IMPACT</div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('admin-menu').style.display='block'" class="bg-slate-800 px-3 py-2 rounded-xl text-xs font-bold border border-slate-700">Settings</button>
            <button onclick="toggleCurrency()" id="curr-btn" class="bg-emerald-600 px-3 py-2 rounded-xl text-xs font-bold">Switch to $</button>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6">
        
        <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700">
            <p class="text-[10px] uppercase font-bold text-slate-400">Live Verified Funding</p>
            <h2 class="text-4xl font-black mt-1" id="display-total">GH₵ 345,000</h2>
            <div class="flex justify-between mt-6 text-center border-t border-slate-700 pt-4">
                <div><p class="text-[9px] text-slate-400">AID PROGRAM</p><p id="aid-p" class="font-bold text-emerald-400">--</p></div>
                <div><p class="text-[9px] text-slate-400">FIELD OPS</p><p id="field-p" class="font-bold text-emerald-400">--</p></div>
                <div><p class="text-[9px] text-slate-400">ADMIN</p><p id="admin-p" class="font-bold text-slate-400">--</p></div>
            </div>
            <div class="mt-4 h-32 flex justify-center"><canvas id="mainChart"></canvas></div>
        </div>

        <div class="bg-indigo-900/30 p-6 rounded-3xl border border-indigo-500/30">
            <h3 class="font-bold text-sm mb-4 flex items-center gap-2">⚡ Impact Simulator</h3>
            <input type="range" id="simSlider" min="100" max="100000" step="100" value="5000" class="w-full h-2 bg-slate-700 rounded-lg accent-emerald-400 appearance-none cursor-pointer">
            <div class="flex justify-between mt-4">
                <div>
                    <p class="text-[10px] text-slate-400">CONTRIBUTION</p>
                    <p id="sim-val" class="text-2xl font-black text-emerald-400">GH₵ 5,000</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-400">LIVES REACHED</p>
                    <p id="sim-impact" class="text-2xl font-black text-white">~ 125 People</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700">
            <h3 class="font-bold text-sm mb-4">ACTIVE PROJECTS</h3>
            <div id="project-list" class="space-y-3"></div>
        </div>
    </main>

    <div id="admin-menu" class="full-modal">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">System Settings</h2>
            <button onclick="document.getElementById('admin-menu').style.display='none'" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl font-bold">Close</button>
        </div>
        
        <div class="space-y-6">
            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
                <label class="block text-xs font-bold mb-2 text-slate-400">Total Raised (GHS)</label>
                <input type="number" id="set-total" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white outline-none">
            </div>
            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
                <label class="block text-xs font-bold mb-2 text-slate-400">Admin Password</label>
                <input type="password" id="admin-pass" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white outline-none" placeholder="Enter password to save">
            </div>
            <button onclick="saveSettings()" class="w-full bg-emerald-600 p-4 rounded-2xl font-black text-lg shadow-lg shadow-emerald-600/20">Apply All Changes</button>
        </div>
    </div>

    <script>
        let adminPassword = "1234";
        let siteData = {
            totalGHS: 345000, rate: 14.5, currency: 'GHS',
            projects: [
                { name: "Wa Water Supply", status: "Procurement", cost: 45000 },
                { name: "Maternal Health Kits", status: "In Progress", cost: 12000 }
            ]
        };

        function refreshUI() {
            const sym = siteData.currency === 'GHS' ? 'GH₵' : '$';
            const factor = siteData.currency === 'GHS' ? 1 : (1/siteData.rate);
            
            document.getElementById('display-total').innerText = `${sym} ${(siteData.totalGHS * factor).toLocaleString()}`;
            document.getElementById('aid-p').innerText = `${sym} ${(siteData.totalGHS * 0.84 * factor).toLocaleString(undefined, {maximumFractionDigits:0})}`;
            document.getElementById('field-p').innerText = `${sym} ${(siteData.totalGHS * 0.11 * factor).toLocaleString(undefined, {maximumFractionDigits:0})}`;
            document.getElementById('admin-p').innerText = `${sym} ${(siteData.totalGHS * 0.05 * factor).toLocaleString(undefined, {maximumFractionDigits:0})}`;

            const list = document.getElementById('project-list');
            list.innerHTML = siteData.projects.map(p => `
                <div class="p-4 bg-slate-900/50 rounded-2xl border border-slate-700">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-white">${p.name}</span>
                        <span class="text-[9px] bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded-lg uppercase">${p.status}</span>
                    </div>
                    <p class="text-[10px] text-slate-500 mt-1">Budget: ${sym} ${(p.cost * factor).toLocaleString()}</p>
                </div>
            `).join('');

            document.getElementById('set-total').value = siteData.totalGHS;
            updateSliderDisplay();
            updateChart();
        }

        const slider = document.getElementById('simSlider');
        function updateSliderDisplay() {
            const val = parseInt(slider.value);
            const sym = siteData.currency === 'GHS' ? 'GH₵' : '$';
            document.getElementById('sim-val').innerText = `${sym} ${val.toLocaleString()}`;
            const ghsVal = siteData.currency === 'GHS' ? val : val * siteData.rate;
            document.getElementById('sim-impact').innerText = `~ ${Math.floor(ghsVal/40).toLocaleString()} People`;
        }
        slider.oninput = updateSliderDisplay;

        function toggleCurrency() {
            siteData.currency = siteData.currency === 'GHS' ? 'USD' : 'GHS';
            document.getElementById('curr-btn').innerText = siteData.currency === 'GHS' ? 'Switch to $' : 'Switch to GH₵';
            refreshUI();
        }

        function saveSettings() {
            if (document.getElementById('admin-pass').value !== adminPassword) return alert("Wrong Password!");
            siteData.totalGHS = parseFloat(document.getElementById('set-total').value);
            refreshUI();
            document.getElementById('admin-menu').style.display = 'none';
        }

        let chart;
        function updateChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: { datasets: [{ data: [84, 11, 5], backgroundColor: ['#10b981', '#059669', '#475569'], borderWidth: 0 }] },
                options: { cutout: '80%' }
            });
        }

        window.onload = refreshUI;
    </script>
</body>
</html>
